experiment:
  name: "tesseract_gt_only"
  description: "Tesseract OCR on GT TextLine boxes (S* only, no layout model)"

data:
  images_dir: "data/the_spiritualist/spiritualist_images"
  alto_dir: "data/the_spiritualist/ocr_gt_with_ssu"
  image_ext: "jpg"

box_sources:
  gt: true
  predicted:
    enabled: false
    layout_model: null
    device: "cpu"

ocr:
  model: "tesseract"
  # Tesseract is CPU-only and single-threaded per image — no batching benefit.
  batch_size: 100
  config:
    lang: "eng"
    psm: 7   # single text line — correct for ALTO TextLine crops
    oem: 3   # LSTM neural net engine (most accurate)

output:
  dir: "results/experiments/tesseract_gt_only"
  parquet: true
  json: true
