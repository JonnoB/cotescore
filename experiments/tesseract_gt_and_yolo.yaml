experiment:
  name: "tesseract_gt_and_yolo"
  description: "Tesseract OCR on GT boxes (S*) and DocLayout-YOLO predicted boxes (S)"

data:
  images_dir: "data/the_spiritualist/spiritualist_images"
  alto_dir: "data/the_spiritualist/ocr_gt_with_ssu"
  image_ext: "jpg"

box_sources:
  gt: true
  predicted:
    enabled: true
    layout_model: "yolo"
    device: "cpu"

ocr:
  model: "tesseract"
  # Tesseract is CPU-only and single-threaded per image — no batching benefit.
  batch_size: 1
  config:
    lang: "eng"
    psm: 7   # single text line — correct for ALTO TextLine crops
    oem: 3   # LSTM neural net engine (most accurate)

output:
  dir: "results/experiments/tesseract_gt_and_yolo"
  parquet: true
  json: true
