experiment:
  name: "trocr_gt_only"
  description: "TrOCR on GT TextLine boxes (S* only, no layout model) — CPU"

data:
  images_dir: "data/the_spiritualist/spiritualist_images"
  alto_dir: "data/the_spiritualist/ocr_gt_with_ssu"
  image_ext: "jpg"

box_sources:
  gt: true
  predicted:
    enabled: false
    layout_model: null
    device: "cpu"

ocr:
  model: "trocr"
  config:
    model_name: "microsoft/trocr-base-printed"
    device: "cpu"

output:
  dir: "results/experiments/trocr_gt_only"
  parquet: true
  json: true
