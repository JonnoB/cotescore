experiment:
  name: "paddleocr_gpu_gt_only"
  description: "PaddleOCR on GT TextLine boxes using GPU (S* only, no layout model)"

data:
  images_dir: "data/the_spiritualist/spiritualist_images"
  alto_dir: "data/the_spiritualist/ocr_gt_with_ssu"
  image_ext: "jpg"

box_sources:
  gt: true
  predicted:
    enabled: false
    layout_model: null
    device: "cpu"

ocr:
  model: "paddleocr"
  batch_size: 1
  config:
    lang: "en"
    device: "gpu:0"  # if GPU fails with CUDA 13.0, change to "cpu:0" until PaddlePaddle certifies CUDA 13

output:
  dir: "results/experiments/paddleocr_gpu_gt_only"
  parquet: true
  json: true
