experiment:
  name: "easyocr_gt_only"
  description: "EasyOCR on GT TextLine boxes (S* only, no layout model) — CPU"

data:
  images_dir: "data/the_spiritualist/spiritualist_images"
  alto_dir: "data/the_spiritualist/ocr_gt_with_ssu"
  image_ext: "jpg"

box_sources:
  gt: true
  predicted:
    enabled: false
    layout_model: null
    device: "cpu"

ocr:
  model: "easyocr"
  # EasyOCR has no batch API for pre-cropped images — runner batch_size stays 1.
  batch_size: 1
  config:
    lang:
      - "en"
    gpu: false

output:
  dir: "results/experiments/easyocr_gt_only"
  parquet: true
  json: true
