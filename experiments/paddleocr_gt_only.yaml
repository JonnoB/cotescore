experiment:
  name: "paddleocr_gt_only"
  description: "PaddleOCR on GT TextLine boxes (S* only, no layout model) — CPU"

data:
  images_dir: "data/the_spiritualist/spiritualist_images"
  alto_dir: "data/the_spiritualist/ocr_gt_with_ssu"
  image_ext: "jpg"

box_sources:
  gt: true
  predicted:
    enabled: false
    layout_model: null
    device: "cpu"

ocr:
  model: "paddleocr"
  # PaddleOCR batches internally via rec_batch_num — runner batch_size stays 1.
  batch_size: 1
  config:
    lang: "en"
    use_gpu: false
    rec_batch_num: 6   # internal recognition batch size (CPU default)

output:
  dir: "results/experiments/paddleocr_gt_only"
  parquet: true
  json: true
